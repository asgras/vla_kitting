cell:
  robot_base_frame: base_link
  tool_frame: tcp
  tcp_to_finger_offset: 0.050  # metres

# Single input bin (center position, A2 from original config)
input_bin:
  position: [0.75, 0.0, 0.05]       # base_link frame, bin center
  size: [0.350, 0.350, 0.100]       # exterior dimensions (W×D×H)
  parts_per_episode: 1               # start with 1, scale to 3

# Output tray (unchanged from original)
output_tray:
  origin: [0.0, -0.75, 0.02]
  slot_spacing: 0.10                 # 100mm between slot centres
  slots:
    slot_0: {position: [-0.10, -0.10, 0.02]}
    slot_1: {position: [-0.10,  0.00, 0.02]}
    slot_2: {position: [-0.10,  0.10, 0.02]}
    slot_3: {position: [ 0.00, -0.10, 0.02]}
    slot_4: {position: [ 0.00,  0.00, 0.02]}
    slot_5: {position: [ 0.00,  0.10, 0.02]}
    slot_6: {position: [ 0.10, -0.10, 0.02]}
    slot_7: {position: [ 0.10,  0.00, 0.02]}
    slot_8: {position: [ 0.10,  0.10, 0.02]}

# Camera — RGB only, no depth/point cloud
camera:
  type: RGB
  position: [1.25, 0.0, 1.50]
  resolution: [640, 480]             # native; downsampled to 256x256 for model
  topic_sim: /sim/image_raw
  topic_real: /camera/image_raw

# Large boxes only (no pex_elbow)
parts:
  single_gang_box:
    dims: [0.100, 0.055, 0.055]
    grasp: parallel
  round_box:
    dims: [0.070, 0.070, 0.055]
    grasp: parallel

# Safety limits for VLA control
safety:
  max_delta_joint: 0.05              # rad per step (at 10Hz → 0.5 rad/s)
  max_joint_velocity: 0.5            # rad/s absolute limit
  workspace_bounds:
    x: [-0.2, 1.2]
    y: [-1.0, 0.7]
    z: [-0.02, 1.0]
  episode_timeout: 60.0              # seconds
  joint_limits:                      # rad/s per joint (from URDF)
    - 2.36
    - 2.36
    - 2.36
    - 2.36
    - 2.36
    - 3.14

# Robot joint names (order matters — matches action vector)
joint_names:
  - joint_1_s
  - joint_2_l
  - joint_3_u
  - joint_4_r
  - joint_5_b
  - joint_6_t

# Home position (all zero except j5=90deg)
home_joints:
  joint_1_s: 0.0
  joint_2_l: 0.0
  joint_3_u: 0.0
  joint_4_r: 0.0
  joint_5_b: 1.5708
  joint_6_t: 0.0

# Gripper
gripper:
  joint_name: finger_joint
  max_width: 0.083                   # 83mm full open
  open_threshold: 0.5                # action > 0.5 → open, else close
