# Octo-Small fine-tuning configuration for VLA kitting
model:
  base: "hf://rail-berkeley/octo-small-1.5"
  pretrained: true
  action_head: "diffusion"
  pred_horizon: 4                    # predict 4 future actions per step
  action_dim: 7                      # 6 joints + gripper
  obs_horizon: 2                     # 2-frame observation history

data:
  dataset_path: "./data/kitting_demos"
  dataset_format: "rlds"
  image_size: [256, 256]
  action_dim: 7
  state_dim: 7
  action_normalization: "normal"     # zero-mean, unit-variance
  window_size: 2

training:
  batch_size: 64
  learning_rate: 3.0e-4
  warmup_steps: 200
  max_steps: 30000                   # ~4 hours on RTX 3090
  weight_decay: 0.01
  save_every: 5000
  eval_every: 2500
  frozen_keys: []                    # fine-tune everything (27M params)
  seed: 42

augmentation:
  random_crop: true
  color_jitter: 0.1
  random_erasing: 0.05

evaluation:
  num_episodes: 100
  success_distance_threshold: 0.050  # 50mm
  rollout_every_n_steps: 5000

# Dataset statistics (computed from training data, filled in by convert_dataset.py)
normalization:
  action_mean: null
  action_std: null
  state_mean: null
  state_std: null
